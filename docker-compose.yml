services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./mcp-server.json:/app/mcp-server.json:ro
      - tianniu-data:/app/data
    environment:
      - GIN_MODE=release
      - DB_PATH=/app/data/tianniu.db
      - LEVELDB_PATH=/app/data/leveldb
      - JWT_SECRET=${JWT_SECRET:-tian-niu-docker-secret-change-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tianniu-data:

networks:
  default:
    name: tianniu-network