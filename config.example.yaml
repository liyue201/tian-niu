server_address: ":8080"

# Database configuration
# Supported types: sqlite, postgres, mysql
database:
  type: "sqlite"
  # For SQLite: path to database file
  # dsn: "test.db"
  # For PostgreSQL: "host=localhost port=5432 user=postgres password=postgres dbname=tianniu sslmode=disable"
  # For MySQL: "user:password@tcp(localhost:3306)/dbname?charset=utf8mb4&parseTime=True&loc=Local"
  dsn: "test.db"

llm_providers:
  front_model:
    base_url: "https://api.openai.com/v1"
    model: "gpt-5.2"
    api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
    context_window: 200000
  back_model:
    base_url: "https://api.openai.com/v1"
    model: "gpt-5.2"
    api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx",
    context_window: 200000
bash_tool:
  timeout_seconds: 30
  max_output_kb: 64
  work_dir: ""
  disabled: false
  allow_dangerous: false

long_term_memory:
  enabled: false
  vector_db:
    host: "localhost"
    port: 5432
    user: "postgres"
    password: "password"
    database: "tianniu_memory"
    dimension: 1536
  embedding_service:
    api_key: "your-embedding-api-key"
    base_url: "https://api.example.com"
    model: "embedding-model"
    dimensions: 1536
  rerank_service:
    api_key: "your-rerank-api-key"
    base_url: "https://api.example.com"
    model: "rerank-model"
  strategy:
    quick_save_rounds: 5
    regular_save_rounds: 10
    force_save_rounds: 20
    min_token_threshold: 500
    topic_similarity_threshold: 0.7